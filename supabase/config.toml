# Supabase CLI project configuration
# Docs: https://supabase.com/docs/guides/cli/config

# A string used to distinguish this project. Used for local dev only.
project_id = "keapos"

[db]
# The port the local Supabase DB will run on (local dev only).
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[api]
# The port the local Supabase API will run on (local dev only).
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
# The base URL of your website. Used in auth emails.
site_url = "env(NEXT_PUBLIC_APP_URL)"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Set to true in production

[studio]
enabled = true
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
# Local email testing — catches all outbound auth emails in dev
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = false
